<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todos na Rede – Atividades EJA | Prof. Reginaldo Rabelo</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(135deg, #e8f0e8 0%, #d4e4d4 100%);
            margin: 0;
            padding: 20px;
            color: #1e2a3e;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            padding: 24px 30px 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 3px solid #ffd966;
            padding-bottom: 20px;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff8e7, #ffffff);
            border-radius: 30px;
            padding: 20px 25px;
        }

        .titulo-area {
            flex: 1;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #2b6e4c, #f4a261);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0 0 8px 0;
        }

        .professor {
            font-size: 1.1rem;
            color: #e67e22;
            font-weight: 600;
            background: #fff3e0;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
        }

        .aluno-area {
            background: #f8f9fa;
            padding: 12px 24px;
            border-radius: 60px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .aluno-area label {
            font-weight: 700;
            color: #2c6e4c;
        }

        .aluno-area input {
            padding: 10px 18px;
            border-radius: 50px;
            border: 2px solid #ffd966;
            font-size: 1rem;
            width: 240px;
            font-family: inherit;
        }

        .btn-enviar {
            background: linear-gradient(135deg, #2b6e4c, #1e6f5c);
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-enviar:hover {
            transform: scale(0.97);
        }

        /* Estilo das abas */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 30px;
            border-bottom: 2px solid #ffe0a3;
            padding-bottom: 10px;
        }
        .tab-btn {
            background: #fff0db;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            color: #c16f2e;
        }
        .tab-btn.ativo {
            background: linear-gradient(135deg, #f4a261, #e76f51);
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .tab-btn:hover:not(.ativo) {
            background: #ffe0b5;
        }

        .tab-conteudo {
            display: none;
        }
        .tab-conteudo.ativo {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
            margin: 35px 0;
        }

        .card {
            background: #ffffff;
            border-radius: 32px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #ffe1a0;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.12);
        }

        .figura {
            background: linear-gradient(145deg, #fffaf0, #fff5e6);
            padding: 20px 15px 15px;
            text-align: center;
            border-bottom: 2px solid #ffe0a3;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .figura img {
            max-width: 100px;
            max-height: 100px;
            object-fit: contain;
            filter: drop-shadow(4px 6px 10px rgba(0, 0, 0, 0.2));
            transition: transform 0.2s;
        }

        .card:hover .figura img {
            transform: scale(1.02);
        }

        .figura-emoji {
            font-size: 5rem;
            display: inline-block;
        }

        .figura-svg {
            width: 90px;
            height: 90px;
        }

        .frase {
            padding: 20px 18px 20px;
            background: #ffffff;
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .frase p {
            margin: 0 0 12px 0;
            color: #2d3e3a;
        }

        input.resposta {
            font-size: 1rem;
            padding: 10px 12px;
            width: 100%;
            max-width: 170px;
            border: 2px solid #ffd48a;
            border-radius: 60px;
            font-weight: 500;
            text-align: center;
            background-color: #fffef7;
            transition: 0.2s;
            font-family: inherit;
            margin-top: 6px;
        }

        input.resposta:focus {
            border-color: #f4a261;
            outline: none;
            box-shadow: 0 0 0 3px rgba(244,162,97,0.2);
        }

        .btn-check {
            background: #fff0db;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 700;
            color: #c16f2e;
            cursor: pointer;
            margin-top: 12px;
            font-size: 0.8rem;
            transition: 0.2s;
            display: inline-block;
            font-family: inherit;
        }

        .btn-check:hover {
            background: #ffe0b5;
            transform: scale(0.96);
        }

        .feedback {
            margin-top: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            padding-left: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .correto {
            color: #2b6e4c;
            background: #e0f2e9;
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
        }

        .errado {
            color: #c2410c;
            background: #ffe6de;
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
        }

        .acao-global {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0 25px;
        }

        button {
            background: #f1f5f9;
            border: none;
            padding: 12px 26px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        button.primario {
            background: linear-gradient(135deg, #f4a261, #e76f51);
            color: white;
        }

        button.primario:hover {
            transform: scale(0.97);
        }

        .footer {
            text-align: center;
            margin-top: 35px;
            font-size: 0.8rem;
            color: #7f8c7a;
            border-top: 1px solid #ffe0b5;
            padding-top: 20px;
        }

        .mensagem-envio {
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            border-radius: 60px;
            font-weight: 500;
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            min-width: 300px;
        }

        .sucesso {
            background: #d9f0e3;
            color: #1e5a3e;
            display: block;
            border-left: 5px solid #2b6e4c;
        }

        .erro-email {
            background: #ffe0d6;
            color: #b13e2d;
            display: block;
            border-left: 5px solid #e76f51;
        }

        .loading {
            background: #fff3cd;
            color: #856404;
            display: block;
            border-left: 5px solid #ffc107;
        }

        @media (max-width: 700px) {
            .container {
                padding: 16px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .figura img {
                max-width: 70px;
                max-height: 70px;
            }
            .figura-svg {
                width: 70px;
                height: 70px;
            }
            .tab-btn {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

        { figuraTipo: "emoji", figura: "🧮", resposta: "ÁBACO", dica: "ábaco" },
        { figuraTipo: "emoji", figura: "🔬", resposta: "MICROSCÓPIO", dica: "microscópio" },
        { figuraTipo: "emoji", figura: "🎨", resposta: "TINTA", dica: "tinta" },
        { figuraTipo: "emoji", figura: "📀", resposta: "DVD", dica: "DVD" }
    ];
    const frasesEscola = [
        "Eu leio um ______ toda noite antes de dormir.",
        "Escrevo minhas tarefas no ______.",
        "Use o ______ para desenhar e escrever.",
        "A ______ apaga os erros do lápis.",
        "Carrego meus materiais na ______.",
        "Meço os traços com a ______.",
        "Corto o papel com a ______.",
        "Pinto os desenhos com ______.",
        "A ______ tem muitos livros para emprestar.",
        "Vou todos os dias para a ______.",
        "A ______ explica a matéria com carinho.",
        "O ______ estuda e faz as lições.",
        "A ______ tem perguntas para responder.",
        "O ______ mostra os dias do mês.",
        "A ______ escreve com tinta permanente.",
        "O ______ segura os papéis no mural.",
        "O ______ ajuda a fazer contas de somar.",
        "O ______ permite ver coisas muito pequenas.",
        "A ______ é usada para pintar quadros.",
        "O ______ pode conter filmes educativos."
    ];

    // ==================== ATIVIDADE TRANSPORTE ====================
    const atividadesTransporte = [
        { figuraTipo: "emoji", figura: "🚗", resposta: "CARRO", dica: "carro" },
        { figuraTipo: "emoji", figura: "✈️", resposta: "AVIÃO", dica: "avião" },
        { figuraTipo: "emoji", figura: "🚢", resposta: "NAVIO", dica: "navio" },
        { figuraTipo: "emoji", figura: "🚲", resposta: "BICICLETA", dica: "bicicleta" },
        { figuraTipo: "emoji", figura: "🚌", resposta: "ÔNIBUS", dica: "ônibus" },
        { figuraTipo: "emoji", figura: "🚂", resposta: "TREM", dica: "trem" },
        { figuraTipo: "emoji", figura: "🏍️", resposta: "MOTO", dica: "moto" },
        { figuraTipo: "emoji", figura: "🚁", resposta: "HELICÓPTERO", dica: "helicóptero" },
        { figuraTipo: "emoji", figura: "🚀", resposta: "FOGUETE", dica: "foguete" },
        { figuraTipo: "emoji", figura: "🚤", resposta: "LANCHA", dica: "lancha" },
        { figuraTipo: "emoji", figura: "🚐", resposta: "VAN", dica: "van" },
        { figuraTipo: "emoji", figura: "🛴", resposta: "PATINETE", dica: "patinete" },
        { figuraTipo: "emoji", figura: "🛵", resposta: "SCOOTER", dica: "scooter" },
        { figuraTipo: "emoji", figura: "🚑", resposta: "AMBULÂNCIA", dica: "ambulância" },
        { figuraTipo: "emoji", figura: "🚒", resposta: "BOMBEIRO", dica: "carro de bombeiro" },
        { figuraTipo: "emoji", figura: "🚓", resposta: "POLÍCIA", dica: "viatura" },
        { figuraTipo: "emoji", figura: "🚜", resposta: "TRATOR", dica: "trator" },
        { figuraTipo: "emoji", figura: "🏎️", resposta: "CARRO DE CORRIDA", dica: "carro de corrida" },
        { figuraTipo: "emoji", figura: "⛵", resposta: "VELEIRO", dica: "veleiro" },
        { figuraTipo: "emoji", figura: "🛶", resposta: "CANOA", dica: "canoa" }
    ];
    const frasesTransporte = [
        "Meu pai dirige o ______ para ir ao trabalho.",
        "O ______ voa bem alto no céu.",
        "O ______ navega pelos oceanos.",
        "Pedalo na minha ______ todos os dias.",
        "Pego o ______ para ir à escola.",
        "O ______ passa pelos trilhos.",
        "Ele pilotava uma ______ preta.",
        "O ______ pode pousar em lugares pequenos.",
        "O ______ viaja para o espaço.",
        "A ______ é rápida e usada no mar.",
        "A ______ leva grupos menores de pessoas.",
        "A criança andava de ______ na calçada.",
        "A ______ é parecida com a moto, mas menor.",
        "A ______ leva doentes ao hospital.",
        "O ______ combate incêndios.",
        "A ______ persegue os bandidos.",
        "O ______ puxa arado no campo.",
        "O ______ é muito veloz nas pistas.",
        "O ______ usa velas para se mover.",
        "A ______ é remada em rios e lagos."
    ];

    // Mapeamento para gerenciar cada aba
    const abas = {
        tab1: { atividades: atividadesPrincipal, frases: frasesPrincipal, gridId: "grid-principal", inputs: [] },
        tab2: { atividades: atividadesFrutas, frases: frasesFrutas, gridId: "grid-frutas", inputs: [] },
        tab3: { atividades: atividadesEscola, frases: frasesEscola, gridId: "grid-escola", inputs: [] },
        tab4: { atividades: atividadesTransporte, frases: frasesTransporte, gridId: "grid-transporte", inputs: [] }
    };

    let abaAtual = "tab1";

    function normalizarTexto(texto) {
        return texto.trim().toUpperCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
            .replace(/[^A-Z0-9]/g, '');
    }

    function renderizarFigura(item) {
        if (item.figuraTipo === "svg") {
            return item.svgFunc();
        }
        return `<span class="figura-emoji">${item.figura}</span>`;
    }

    function renderizarAba(abaId) {
        const aba = abas[abaId];
        const grid = document.getElementById(aba.gridId);
        if (!grid) return;
        grid.innerHTML = "";
        const inputsTemp = [];

        aba.atividades.forEach((atividade, idx) => {
            const card = document.createElement("div");
            card.className = "card";

            const figuraDiv = document.createElement("div");
            figuraDiv.className = "figura";
            figuraDiv.innerHTML = renderizarFigura(atividade);

            const fraseDiv = document.createElement("div");
            fraseDiv.className = "frase";
            const fraseCompleta = aba.frases[idx];
            const partes = fraseCompleta.split("______");
            let fraseHtml = "<p>";
            for (let i = 0; i < partes.length; i++) {
                fraseHtml += partes[i];
                if (i < partes.length - 1) {
                    fraseHtml += `<input type="text" class="resposta" id="${abaId}_resp_${idx}" placeholder="______" autocomplete="off">`;
                }
            }
            fraseHtml += "</p>";
            fraseDiv.innerHTML = fraseHtml;

            const btnVerificar = document.createElement("button");
            btnVerificar.textContent = "Verificar";
            btnVerificar.className = "btn-check";
            const feedbackSpan = document.createElement("div");
            feedbackSpan.className = "feedback";
            feedbackSpan.id = `${abaId}_fb_${idx}`;
            feedbackSpan.innerHTML = "✨ ";

            fraseDiv.appendChild(btnVerificar);
            fraseDiv.appendChild(feedbackSpan);
            card.appendChild(figuraDiv);
            card.appendChild(fraseDiv);
            grid.appendChild(card);

            const inputEl = document.getElementById(`${abaId}_resp_${idx}`);
            inputsTemp.push({
                input: inputEl,
                feedback: feedbackSpan,
                respostaCorreta: atividade.resposta,
                idx: idx
            });

            btnVerificar.addEventListener("click", () => verificarIndividual(abaId, idx));
            inputEl.addEventListener("keypress", (e) => {
                if (e.key === "Enter") verificarIndividual(abaId, idx);
            });
        });
        aba.inputs = inputsTemp;
    }

    function verificarIndividual(abaId, idx) {
        const aba = abas[abaId];
        const item = aba.inputs[idx];
        if (!item) return;
        const digitado = item.input.value;
        const normalizadoDigitado = normalizarTexto(digitado);
        const normalizadoCorreto = normalizarTexto(item.respostaCorreta);
        const correto = normalizadoDigitado === normalizadoCorreto;

        if (correto) {
            item.feedback.innerHTML = "✅ Muito bem!";
            item.feedback.className = "feedback correto";
            item.input.style.borderColor = "#2b6e4c";
            item.input.style.backgroundColor = "#eafaf3";
        } else {
            item.feedback.innerHTML = `❌ Quase! A palavra é ${item.respostaCorreta}.`;
            item.feedback.className = "feedback errado";
            item.input.style.borderColor = "#f4a261";
            item.input.style.backgroundColor = "#fff5ea";
        }
    }

    function verificarTodas() {
        const aba = abas[abaAtual];
        for (let i = 0; i < aba.inputs.length; i++) {
            verificarIndividual(abaAtual, i);
        }
    }

    function limparTodas() {
        const aba = abas[abaAtual];
        for (let i = 0; i < aba.inputs.length; i++) {
            const item = aba.inputs[i];
            item.input.value = "";
            item.input.style.borderColor = "#ffd48a";
            item.input.style.backgroundColor = "#fffef7";
            item.feedback.innerHTML = "✨ ";
            item.feedback.className = "feedback";
        }
    }

    function mostrarGabarito() {
        const aba = abas[abaAtual];
        for (let i = 0; i < aba.inputs.length; i++) {
            const item = aba.inputs[i];
            item.feedback.innerHTML = `💡 Resposta: ${item.respostaCorreta}`;
            item.feedback.className = "feedback";
        }
    }

    function obterRespostasFormatadas() {
        const nomeAluno = document.getElementById("nomeAluno").value.trim() || "[não informado]";
        const aba = abas[abaAtual];
        let tituloAba = "";
        if (abaAtual === "tab1") tituloAba = "Principal";
        else if (abaAtual === "tab2") tituloAba = "Frutas";
        else if (abaAtual === "tab3") tituloAba = "Escola";
        else tituloAba = "Transporte";

        let respostasTexto = `📋 ATIVIDADE - TODOS NA REDE (${tituloAba})\n`;
        respostasTexto += `👨‍🎓 Aluno(a): ${nomeAluno}\n`;
        respostasTexto += `📅 Data: ${new Date().toLocaleString('pt-BR')}\n`;
        respostasTexto += `═`.repeat(50) + `\n\n`;

        let acertos = 0;
        for (let i = 0; i < aba.atividades.length; i++) {
            const fraseOriginal = aba.frases[i];
            const respostaAluno = aba.inputs[i].input.value.trim() || "[em branco]";
            const correta = aba.atividades[i].resposta;
            const estaCorreta = normalizarTexto(respostaAluno) === normalizarTexto(correta);
            if (estaCorreta) acertos++;

            respostasTexto += `${(i+1).toString().padStart(2, '0')}. ${fraseOriginal.replace('______', '________')}\n`;
            respostasTexto += `   Resposta: "${respostaAluno}" ${estaCorreta ? '✓' : '✗'} (Correta: ${correta})\n\n`;
        }
        respostasTexto += `\n${`═`.repeat(50)}\n`;
        respostasTexto += `📊 Total de acertos: ${acertos} de ${aba.atividades.length} (${Math.round(acertos/aba.atividades.length*100)}%)\n`;
        respostasTexto += `✨ Atividade concluída! ✨`;
        return { texto: respostasTexto, acertos, total: aba.atividades.length };
    }

    async function enviarViaFormspree() {
        const nomeAluno = document.getElementById("nomeAluno").value.trim();
        if (!nomeAluno) {
            mostrarMensagem("📝 Por favor, digite seu nome antes de enviar.", "erro-email");
            return;
        }
        const { texto: respostasTexto, acertos, total } = obterRespostasFormatadas();

        // Cria um formulário temporário para envio
        const form = document.createElement("form");
        form.method = "POST";
        form.action = "https://formspree.io/f/mvzwjoza"; // 🔧 SUBSTITUA PELO SEU ID
        form.style.display = "none";
        const nomeField = document.createElement("input");
        nomeField.name = "nome_aluno";
        nomeField.value = nomeAluno;
        const respField = document.createElement("input");
        respField.name = "respostas";
        respField.value = respostasTexto;
        const dataField = document.createElement("input");
        dataField.name = "data_envio";
        dataField.value = new Date().toLocaleString('pt-BR');
        const acertosField = document.createElement("input");
        acertosField.name = "acertos";
        acertosField.value = `${acertos}/${total}`;
        const subjectField = document.createElement("input");
        subjectField.name = "_subject";
        subjectField.value = `Atividade - ${nomeAluno} (${abaAtual === "tab1" ? "Principal" : abaAtual === "tab2" ? "Frutas" : abaAtual === "tab3" ? "Escola" : "Transporte"})`;
        form.appendChild(nomeField);
        form.appendChild(respField);
        form.appendChild(dataField);
        form.appendChild(acertosField);
        form.appendChild(subjectField);
        document.body.appendChild(form);

        mostrarMensagem("📤 Enviando respostas... Aguarde.", "loading");

        try {
            const response = await fetch(form.action, {
                method: "POST",
                body: new FormData(form),
                headers: { "Accept": "application/json" }
            });
            if (response.ok) {
                mostrarMensagem("✅ Respostas enviadas com sucesso! Professor Reginaldo receberá seu trabalho.", "sucesso");
                setTimeout(() => {
                    const msgDiv = document.getElementById("mensagemEnvio");
                    msgDiv.style.display = "none";
                }, 5000);
            } else {
                mostrarMensagem("❌ Erro ao enviar. Verifique o Formspree.", "erro-email");
            }
        } catch (error) {
            mostrarMensagem("❌ Erro de conexão. Tente novamente.", "erro-email");
        } finally {
            document.body.removeChild(form);
        }
    }

    function mostrarMensagem(texto, tipo) {
        const msgDiv = document.getElementById("mensagemEnvio");
        msgDiv.innerHTML = texto;
        msgDiv.className = `mensagem-envio ${tipo}`;
        msgDiv.style.display = "block";
        if (tipo !== "loading") {
            setTimeout(() => {
                if (msgDiv.className.includes(tipo)) msgDiv.style.display = "none";
            }, 5000);
        }
    }

    // Inicializar abas e eventos
    window.addEventListener("DOMContentLoaded", () => {
        // Renderiza todas as abas
        renderizarAba("tab1");
        renderizarAba("tab2");
        renderizarAba("tab3");
        renderizarAba("tab4");

        // Eventos dos botões das abas
        const botoesTab = document.querySelectorAll(".tab-btn");
        botoesTab.forEach(btn => {
            btn.addEventListener("click", () => {
                const tabId = btn.getAttribute("data-tab");
                if (!tabId) return;
                // Remove ativo de todos os botões e conteúdos
                botoesTab.forEach(b => b.classList.remove("ativo"));
                document.querySelectorAll(".tab-conteudo").forEach(cont => cont.classList.remove("ativo"));
                btn.classList.add("ativo");
                document.getElementById(tabId).classList.add("ativo");
                abaAtual = tabId;
            });
        });

        document.getElementById("verificarTodosBtn").addEventListener("click", verificarTodas);
        document.getElementById("limparTodosBtn").addEventListener("click", limparTodas);
        document.getElementById("mostrarGabaritoBtn").addEventListener("click", mostrarGabarito);
        document.getElementById("btnEnviarFormspree").addEventListener("click", enviarViaFormspree);
    });
</script>
